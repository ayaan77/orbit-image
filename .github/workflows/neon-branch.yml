name: Create/Delete Neon Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@dde14ac574a8b9b1cedc59a1cf312788af43d8d8 # v8

  create_neon_branch:
    name: Create Neon Branch
    needs: setup
    if: |
      github.event_name == 'pull_request' && (
      github.event.action == 'synchronize'
      || github.event.action == 'opened'
      || github.event.action == 'reopened')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install neonctl
        run: npm i -g neonctl

      - name: Create Neon Branch and Run Migrations
        run: |
          BRANCH_NAME="preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}"
          EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')

          # Create branch (idempotent — returns existing if already created)
          neonctl branches create \
            --project-id "$NEON_PROJECT_ID" \
            --name "$BRANCH_NAME" \
            --suspend-timeout 300 \
            2>/dev/null || true

          # Get the connection string (|| DATABASE_URL="" so a missing branch doesn't abort the script)
          DATABASE_URL=$(neonctl connection-string "$BRANCH_NAME" \
            --project-id "$NEON_PROJECT_ID" \
            --pooled 2>/dev/null) || DATABASE_URL=""

          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::Could not get Neon connection string. Skipping migrations."
            exit 0
          fi

          # Run migrations
          for migration in scripts/migrate-*.sql; do
            echo "Running $migration..."
            psql "$DATABASE_URL" -f "$migration"
          done
        env:
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@c2005bb7d7caeba12ba3ec63857e9c9f9a4d695a # v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
